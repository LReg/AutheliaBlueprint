name: Build go-fiber on PR

on:
  workflow_dispatch:
  pull_request:
    branches: 
    - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Build the Docker image
      run: chmod +x ./setup.sh && ./use.sh go-fiber angular && ./setup local && ./docker-cli.sh backend build
